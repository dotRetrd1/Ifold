paths: 
  ca_coords: "./data/ca_coords"       
  models: "./data/models" 
  weights_file: "ifold_weights.pth"
  inference_out: "./results"
  scripts: "./scripts"
  scripts_training: "./scripts/training"
  scripts_datascripts: "./scripts/dataPrep"

training:
  epochs: 40
  batch_size: 4
  learning_rate: 0.0001
  pretrained_model: none
  loss_chunk_size: 16
  lambda_triangle: 0.5
  checkpoint_interval: 10

model:
  input_features: 4
  hidden_channels: 32
  num_blocks: 6

reconstruction:
  resolution: 0.5                    
  max_iterations: 100