paths: 
  ca_coords: "./data/ca_coords"       
  models: "./data/models" 
  weights_file: "ifold_weights.pth"
  inference_out: "./results"
  scripts: "./scripts"
  scripts_training: "./scripts/training"
  scripts_datascripts: "./scripts/dataPrep"

training:
  epochs: 100
  batch_size: 12
  learning_rate: 0.000005
  pretrained_model: ifold_weights.pth

  loss_chunk_size: 8

  lambda_triangle: 0.15
  lambda_local: 0.6
  lambda_contact: 0.25

  checkpoint_interval: 15

  use_pretrained: true

model:
  input_features: 4
  hidden_channels: 32
  num_blocks: 6

reconstruction:
  resolution: 0.5                    
  max_iterations: 100