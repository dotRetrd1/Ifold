paths: 
  ca_coords: "./data/ca_coords"       
  models: "./data/models" 
  weights_file: "ifold_weights.pth"
  inference_out: "./results"
  scripts: "./scripts"
  scripts_training: "./scripts/training"
  scripts_datascripts: "./scripts/dataPrep"

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.00005
  pretrained_model: none
  loss_chunk_size: 32
  lambda_triangle: 0.5
  checkpoint_interval: 5

model:
  input_features: 4
  hidden_channels: 64
  num_blocks: 10

reconstruction:
  resolution: 0.5                    
  max_iterations: 100